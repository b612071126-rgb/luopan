<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>个人罗盘</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🧭 个人罗盘</h1>


<div class="compass">


<div class="north">N</div>

<div class="east">E</div>

<div class="south">S</div>

<div class="west">W</div>


<div id="needle">
▲
</div>


</div>



<div class="info">


<h3>
角度
</h3>

<div id="degree">
0°
</div>



<h3>
方向
</h3>

<div id="direction">
北
</div>



<button id="calibrate">
校准罗盘
</button>


<button id="reset">
清除校准
</button>



<h4>
传感器状态
</h4>


<p id="status">
等待传感器...
</p>


<h4>
调试数据
</h4>


<p id="debug">

</p>



</div>



<script src="app.js"></script>


</body>


</html>
