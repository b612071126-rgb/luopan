<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>个人罗盘</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>
🧭 个人罗盘
</h1>



<div class="compass">


<div class="mark north">
北
</div>


<div class="mark east">
东
</div>


<div class="mark south">
南
</div>


<div class="mark west">
西
</div>



<div class="degree-line">

</div>



<div id="needle">

▲

</div>


</div>



<div class="panel">


<div>

当前角度

</div>


<h2 id="degree">

0°

</h2>



<div>

当前方向

</div>


<h2 id="direction">

北

</h2>



<button id="calibrate">

校准

</button>


</div>



<script src="app.js"></script>


</body>


</html>
